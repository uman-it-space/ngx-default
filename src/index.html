<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>uman-it-space</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      try {
        const storedMode = localStorage.getItem('app-mode');
        const preferredMode =
          storedMode === 'dark' || storedMode === 'light'
            ? storedMode
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        document.documentElement.setAttribute('data-mode', preferredMode);
      } catch {}
    </script>

    <meta
      name="description"
      content="uman-it-space - web and mobile app development, IT education, internships, and digital solutions for businesses in Uman and beyond."
    />
    <meta name="author" content="uman-it-space Team" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />

    <meta itemprop="name" content="uman-it-space" />
    <meta
      itemprop="description"
      content="Web and mobile app development, IT education, internships, and digital products by uman-it-space."
    />
    <meta itemprop="image" content="https://umanit.space/logo.png" />
